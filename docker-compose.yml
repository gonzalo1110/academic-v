services:

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: academic_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/php.ini
    ports:
      - "8081:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - academic-net
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  db:
    image: mysql:8.0
    container_name: academic_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: academic
      MYSQL_ROOT_PASSWORD: passwordroot
    ports:
      - "3308:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - academic-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppasswordroot"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: academic_pma
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    ports:
      - "8082:80"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - academic-net
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: academic_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - academic-net
    restart: unless-stopped
    # Para usar GPU si está disponible, descomentar:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

networks:
  academic-net:
    driver: bridge

volumes:
  db_data:
  ollama_data:
